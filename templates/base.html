<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QRIS Quantum Demo{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --mandiri-navy:   #003F7F;
      --mandiri-blue:   #0066CC;
      --mandiri-gold:   #F5A623;
      --mandiri-amber:  #E8930A;
      --mandiri-light:  #E8F0FB;
      --mandiri-white:  #FFFFFF;
      --danger-red:     #D93025;
      --danger-dark:    #8B0000;
      --success-green:  #1A7F4E;
      --gray-100:       #F5F7FA;
      --gray-200:       #E8ECF0;
      --gray-400:       #9BA5B0;
      --gray-700:       #3D4A58;
      --gray-900:       #1A2330;
      --font-main:      'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-main);
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
    }
    /* ─── NAVBAR ─────────────────────────────────── */
    .navbar {
      background: linear-gradient(135deg, var(--mandiri-navy) 0%, #002855 100%);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 32px; height: 32px;
      background: var(--mandiri-gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: var(--mandiri-navy);
    }
    .navbar-title {
      font-size: 15px; font-weight: 700;
      color: var(--mandiri-white); letter-spacing: 0.3px;
    }
    .navbar-subtitle {
      font-size: 10px; font-weight: 400;
      color: rgba(255,255,255,0.55); letter-spacing: 1px;
      text-transform: uppercase;
    }
    .navbar-links { display: flex; gap: 4px; }
    .navbar-links a {
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 6px;
      transition: all .2s;
    }
    .navbar-links a:hover, .navbar-links a.active {
      color: var(--mandiri-white);
      background: rgba(255,255,255,0.12);
    }
    /* ─── MAIN CONTENT ───────────────────────────── */
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    /* ─── CARDS ──────────────────────────────────── */
    .card {
      background: var(--mandiri-white);
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; gap: 10px;
    }
    .card-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .card-icon.blue  { background: var(--mandiri-light); }
    .card-icon.gold  { background: #FFF3DC; }
    .card-icon.red   { background: #FDECEA; }
    .card-icon.green { background: #E8F5EE; }
    .card-title  { font-size: 14px; font-weight: 700; color: var(--gray-900); }
    .card-sub    { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .card-body   { padding: 20px; }
    /* ─── BUTTONS ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 10px;
      font-family: var(--font-main); font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all .18s;
      text-decoration: none; white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--mandiri-blue), var(--mandiri-navy));
      color: white; box-shadow: 0 2px 8px rgba(0,63,127,.25);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,63,127,.35);
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--mandiri-gold), var(--mandiri-amber));
      color: var(--mandiri-navy); box-shadow: 0 2px 8px rgba(245,166,35,.3);
    }
    .btn-gold:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-danger {
      background: linear-gradient(135deg, #E53935, var(--danger-dark));
      color: white; box-shadow: 0 2px 8px rgba(217,48,37,.3);
    }
    .btn-danger:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-success {
      background: linear-gradient(135deg, #2E7D32, var(--success-green));
      color: white; box-shadow: 0 2px 8px rgba(26,127,78,.3);
    }
    .btn-outline {
      background: transparent; border: 1.5px solid var(--gray-200);
      color: var(--gray-700);
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--mandiri-blue); color: var(--mandiri-blue); }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; }
    /* ─── FORM ────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; display: block; }
    .form-control {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--gray-200); background: var(--gray-100);
      font-family: var(--font-main); font-size: 14px; color: var(--gray-900);
      transition: border-color .2s;
    }
    .form-control:focus { outline: none; border-color: var(--mandiri-blue); background: white; }
    /* ─── BADGE / STATUS ──────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-success { background: #E8F5EE; color: #1A7F4E; }
    .badge-danger  { background: #FDECEA; color: #C62828; }
    .badge-warning { background: #FFF3DC; color: #8B5E00; }
    .badge-info    { background: var(--mandiri-light); color: var(--mandiri-navy); }
    .badge-gray    { background: var(--gray-200); color: var(--gray-700); }
    /* ─── TERMINAL LOG ────────────────────────────── */
    .terminal {
      background: #0D1117; border-radius: 12px;
      padding: 16px; font-family: 'Courier New', monospace;
      font-size: 11.5px; line-height: 1.7; max-height: 280px;
      overflow-y: auto; color: #C9D1D9;
    }
    .terminal::-webkit-scrollbar { width: 5px; }
    .terminal::-webkit-scrollbar-track { background: #161B22; }
    .terminal::-webkit-scrollbar-thumb { background: #30363D; border-radius: 3px; }
    .log-info    { color: #79C0FF; }
    .log-success { color: #56D364; }
    .log-warning { color: #E3B341; }
    .log-danger  { color: #FF7B72; font-weight: bold; }
    .log-time    { color: #484F58; margin-right: 6px; }
    .log-entity  { margin-right: 6px; }
    .log-entity.BANK     { color: #79C0FF; }
    .log-entity.ATTACKER { color: #FF7B72; }
    .log-entity.MBANKING { color: #56D364; }
    .log-entity.SYSTEM   { color: #E3B341; }
    /* ─── DIVIDER ─────────────────────────────────── */
    .divider { height: 1px; background: var(--gray-200); margin: 16px 0; }
    /* ─── GRID ────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    /* ─── CHIP / DATA ROW ─────────────────────────── */
    .data-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--gray-200); font-size: 13px;
    }
    .data-row:last-child { border-bottom: none; }
    .data-key   { color: var(--gray-400); font-size: 12px; }
    .data-value { font-weight: 600; color: var(--gray-900); font-family: 'Courier New', monospace; font-size: 12px; }
    /* ─── ALERT ───────────────────────────────────── */
    .alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-danger  { background: #FDECEA; color: #C62828; border-left: 3px solid #E53935; }
    .alert-success { background: #E8F5EE; color: #1A7F4E; border-left: 3px solid #2E7D32; }
    .alert-warning { background: #FFF3DC; color: #8B5E00; border-left: 3px solid var(--mandiri-gold); }
    .alert-info    { background: var(--mandiri-light); color: var(--mandiri-navy); border-left: 3px solid var(--mandiri-blue); }
    /* ─── STEP INDICATOR ─────────────────────────── */
    .steps { display: flex; align-items: center; gap: 0; margin-bottom: 20px; }
    .step { display: flex; align-items: center; flex: 1; }
    .step-circle {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      background: var(--gray-200); color: var(--gray-400);
      transition: all .3s;
    }
    .step-circle.active { background: var(--mandiri-blue); color: white; }
    .step-circle.done   { background: var(--success-green); color: white; }
    .step-circle.danger { background: var(--danger-red); color: white; }
    .step-line { flex: 1; height: 2px; background: var(--gray-200); transition: background .3s; }
    .step-line.active { background: var(--mandiri-blue); }
    .step-line.done   { background: var(--success-green); }
    .step-label { font-size: 10px; color: var(--gray-400); margin-top: 4px; text-align: center; }
    /* ─── SPINNER ─────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: white;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    /* ─── PULSE ───────────────────────────────────── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    /* ─── QR WRAPPER ──────────────────────────────── */
    .qr-wrapper {
      border-radius: 16px; overflow: hidden;
      display: inline-block; padding: 16px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }
    .qr-wrapper img { display: block; width: 180px; height: 180px; }
    /* ─── AMOUNT DISPLAY ──────────────────────────── */
    .amount-big {
      font-size: 28px; font-weight: 800;
      color: var(--mandiri-navy); letter-spacing: -0.5px;
    }
    .amount-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; }
    /* ─── HIDE/SHOW ───────────────────────────────── */
    .hidden { display: none !important; }
    /* ─── SCROLLBAR GLOBAL ────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">
      <div class="navbar-logo">L</div>
      <div>
        <div class="navbar-title">Livin' Security Lab</div>
        <div class="navbar-subtitle">QRIS Quantum Threat Demo</div>
      </div>
    </a>
    <div class="navbar-links">
      <a href="/" class="{% block nav_home %}{% endblock %}">🏠 Dashboard</a>
      <a href="/kasir" class="{% block nav_kasir %}{% endblock %}">🏪 Kasir</a>
      <a href="/attacker" class="{% block nav_attacker %}{% endblock %}">☠️ Attacker</a>
      <a href="/mbanking" class="{% block nav_mbanking %}{% endblock %}">📱 Customer</a>
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <script>
    // ─── Shared helper: format rupiah ─────────────────
    function formatRp(n) {
      return 'Rp ' + parseInt(n).toLocaleString('id-ID');
    }
    // ─── Shared helper: render terminal log ───────────
    function renderLog(logs, terminalId) {
      const el = document.getElementById(terminalId);
      if (!el) return;
      const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 10;
      el.innerHTML = logs.map(l => {
        const cls = 'log-' + l.level;
        return `<div class="${cls}"><span class="log-time">${l.time}</span><span class="log-entity ${l.entity}">[${l.entity}]</span>${escHtml(l.message)}</div>`;
      }).join('');
      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }
    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
